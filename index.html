<!doctype html>
<html lang="jp">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" href="favicon.png" />
		<title>ランダム譜面ジェネレーター</title>
		<meta
			name="description"
			content="音ゲーの譜面制作用にランダムな譜面を生成するツールです。"
		/>
		<meta
			name="keywords"
			content="音ゲー,譜面,生成,ランダム,譜面生成,譜面ジェネレーター,譜面メーカー,自動"
		/>
		<meta property="og:title" content="ランダム譜面ジェネレーター" />
		<meta property="og:type" content="website" />
		<meta
			property="og:url"
			content="https://aaniki.github.io/random_chart"
		/>
		<meta
			property="og:image"
			content="https://aaniki.github.io/random_chart/ogp.png"
		/>
		<meta property="og:site_name" content="ランダム譜面ジェネレーター" />
		<meta
			property="og:description"
			content="音ゲーの譜面制作用にランダムな譜面を生成するツールです。"
		/>
		<meta property="og:locale" content="ja_JP" />
		<style>
			body {
				background-color: #222;
				color: #fff;
			}
			table {
				table-layout: fixed;
				border-collapse: collapse;
				border-spacing: 0;
			}
			td,
			th {
				border: 1px solid #333;
				min-width: 45px;
				text-align: center;
			}
			.haku {
				font-size: 10px;
			}
			.note {
				background-color: #ffffff;
			}
			.note:nth-child(odd) {
				background-color: #4378a8;
			}
		</style>
	</head>
	<body>
		<h1>ランダム譜面ジェネレーター</h1>
		<p>
			条件に沿ったランダムな固定譜面を自動生成します。<br />
			いい配置が思いつかないからインスピレーションを得たいって時に是非。再生成しまくれば運命の配置と出会えるかも...?<br />
			フリーレーン配置とロングノーツは非対応、現状タップノーツのみです。
		</p>
		<div id="gen_form">
			<fieldset>
				<legend>オプション</legend>
				<p>
					<label
						>レーン数(ヨコ)：<input
							type="number"
							id="kagi"
							min="2"
							max="16"
							step="1"
							value="5"
					/></label>
					<br />
					<label
						>生成する拍数(タテ)：<input
							type="number"
							id="syousetu"
							min="1"
							step="1"
							value="30"
					/></label>
				</p>
				<div id="doujiosi">
					<fieldset>
						<legend>同時押し</legend>
						<label
							><input
								type="checkbox"
								id="doujiosi_boolean"
								checked
							/>同時押しを許可</label
						>
						<div id="doujisoi_form">
							<p>
								<label
									>最大の同時押し数：<input
										type="number"
										id="doujiosi_suu"
										step="1"
										min="2"
										max="5"
										value="2"
								/></label>
							</p>
							<p>
								<label
									>同時押し出現率(%)：<input
										type="number"
										id="doujiosi_rate"
										step="1"
										min="0"
										max="100"
										value="10"
								/></label>
							</p>
							<p>(3点以上の同時押しに関する処理)</p>
						</div>
					</fieldset>
				</div>
				<div id="renda">
					<fieldset>
						<legend>縦連・微縦連</legend>
						<label
							><input
								type="checkbox"
								id="tateren_boolean"
								checked
							/>縦連配置を出にくくする</label
						>
						<div id="tateren_form">
							<p>
								<label
									>縦連判定する小節数(最小)：<input
										type="number"
										id="tateren_int"
										step="1"
										value="2"
								/></label>
							</p>
						</div>
					</fieldset>
				</div>
			</fieldset>
			<input type="button" id="seisei" value="生成" />
			<h3>結果</h3>
			<table id="resurt"></table>
			<input type="button" id="sai_seisei" value="再生成" />
		</div>

		<script>
			let debug = false;

			let l = (...a) => console.log(...a);

			let d_bool_c = () => {
				if (doujiosi_bool.checked) {
					document.querySelector("#doujisoi_form").style =
						"display: block";
				} else {
					document.querySelector("#doujisoi_form").style =
						"display: none";
				}
			};

			let t_bool_c = () => {
				if (tateren_bool.checked) {
					document.querySelector("#tateren_form").style =
						"display: block";
				} else {
					document.querySelector("#tateren_form").style =
						"display: none";
				}
			};

			let kagi_c = () => {
				doujiosi_suu.max = kagi.value;
				if (Number(doujiosi_suu.value) > Number(kagi.value)) {
					doujiosi_suu.value = kagi.value;
				}
			};

			let douj_s = () => {
				if (Number(doujiosi_suu.value) > Number(doujiosi_suu.max)) {
					doujiosi_suu.value = doujiosi_suu.max;
				}
			};
			let rand = (min, max) => {
				// min以上 max以下
				return Math.floor(Math.random() * (max - min + 1)) + min;
			};

			let rand_mul = (min, max, count, exclude = []) => {
				// exclude除外済み候補
				let candidates = [];

				for (let i = min; i <= max; i++) {
					if (!exclude.includes(i)) {
						candidates.push(i);
					}
				}

				// 足りない
				if (candidates.length < count) {
					return false;
				}

				let result = [];

				while (result.length < count) {
					let index = rand(0, candidates.length - 1);
					let value = candidates[index];

					if (!result.includes(value)) {
						result.push(value);
					}
				}

				return result.sort((a, b) => a - b);
			};

			let marge_arr = (...arrays) => {
				return [...new Set(arrays.flat())].sort((a, b) => a - b);
			};

			let gen_chart = () => {
				let fin = !0;
				let kagi_int = Number(kagi.value);
				let syou_int = Number(syousetu.value);
				let douj_tf = doujiosi_bool.checked;
				let douj_int = Number(doujiosi_suu.value);
				let douj_rat = Number(doujiosi_rate.value) / 100;
				let tate_tf = tateren_bool.checked;
				let tate_int = Number(tateren_int.value);

				if (
					!isNaN(kagi_int) &&
					!isNaN(syou_int) &&
					!isNaN(douj_int) &&
					!isNaN(douj_rat) &&
					!isNaN(tate_int) &&
					kagi_int <= 16 &&
					douj_tf
						? douj_int <= kagi_int && 0 <= douj_rat
						: true && tate_tf
							? douj_rat <= 1
							: true
				) {
					try {
						l("VALIDATION OK");
						let chart_dict = [];
						for (let i = 0; i < syou_int; i++) {
							if (douj_tf && tate_tf) {
								//同時押し許可&縦連制御
								l("OPTION-D&T");
								let ararara = [];
								for (let n = 0; n < tate_int; n++) {
									ararara.push(
										chart_dict[i - n - 1] !== undefined
											? chart_dict[i - n - 1]
											: [],
									);
								}
								let sabunn_arr = marge_arr(...ararara);
								let d_int = 1;
								let dict = [];
								if (rand(0, 100) / 100 < douj_rat)
									d_int = rand(2, douj_int);
								let res = rand_mul(
									1,
									kagi_int,
									d_int,
									sabunn_arr,
								);
								if (res === false) {
									//alert("計算エラー！「縦連判定する小節数」「最大の同時押し数」「同時押し出現率」の値を小さくしてみてください。");
									gen_chart();
									return;
								}
								chart_dict[i] = res;
							} else if (!douj_tf && tate_tf) {
								//縦連制御
								l("OPTION-T");
								let ararara = [];
								for (let n = 0; n < tate_int; n++) {
									ararara.push(
										chart_dict[i - n - 1] !== undefined
											? chart_dict[i - n - 1]
											: [],
									);
								}
								let sabunn_arr = marge_arr(...ararara);
								let res = rand_mul(1, kagi_int, 1, sabunn_arr);
								if (res === false) {
									//alert("計算エラー！「縦連判定する小節数」の値を小さくしてみてください。");
									gen_chart();
									return;
								}
								chart_dict[i] = res;
							} else if (douj_tf && !tate_tf) {
								//同時押し許可
								l("OPTION-D");
								let d_int = 1;
								let dict = [];
								if (rand(0, 100) / 100 < douj_rat)
									d_int = rand(2, douj_int);
								chart_dict[i] = rand_mul(1, kagi_int, d_int);
							} else {
								//ノーオプション
								l("NO-OPTION");
								chart_dict[i] = [rand(1, kagi_int)];
							}
						}
						let o = 1;
						let table_code = "";
						chart_dict.forEach((i) => {
							//DOM操作？知らない子ですねぇ...
							let tr = `<tr><td class="haku">${o}</td>`;
							for (let j = 0; j < kagi_int; j++) {
								tr += `<td${i.includes(j + 1) ? " class='note'" : ""}></td>`; //三項演算子大好き
							}
							tr += "</tr>";
							table_code = tr + table_code;
							o++;
						});
						let haku__ = "<tr><td>拍</td>";
						for (let j = 0; j < kagi_int; j++) {
							haku__ += `<td>${j + 1}</td>`;
						}
						haku__ += "</tr>";
						table_code = haku__ + table_code;
						res_tab.innerHTML = table_code;

						window.scrollTo(
							0,
							document.documentElement.scrollHeight,
						);
					} catch (e) {
						alert(
							"計算エラー！入力された値に問題があるようです...",
						);
					}
				}
			};

			//同時押し処理tf
			let doujiosi_bool = document.querySelector("#doujiosi_boolean");
			doujiosi_bool.addEventListener("change", d_bool_c);
			//縦連処理tf
			let tateren_bool = document.querySelector("#tateren_boolean");
			tateren_bool.addEventListener("change", t_bool_c);
			//レーン数
			let kagi = document.querySelector("#kagi");
			kagi.addEventListener("input", kagi_c);
			//同時押し数
			let doujiosi_suu = document.querySelector("#doujiosi_suu");
			doujiosi_suu.addEventListener("input", douj_s);
			//小節数
			let syousetu = document.querySelector("#syousetu");
			//同時押し確率(%)
			let doujiosi_rate = document.querySelector("#doujiosi_rate");
			//縦連判定小節数
			let tateren_int = document.querySelector("#tateren_int");
			//テーブル
			let res_tab = document.querySelector("#resurt");
			//ボタン
			let exc_button = document.querySelector("#seisei");
			exc_button.addEventListener("click", gen_chart);
			//ボタン
			let sai_exc_button = document.querySelector("#sai_seisei");
			sai_exc_button.addEventListener("click", gen_chart); //意味あるのかね
			gen_chart(); //初期生成
		</script>
	</body>
</html>
